name: "Bug Report: Claude Code Plugin"
description: "Report a bug in the rlsp-yaml Claude Code plugin"
labels: ["bug", "claude-code-plugin"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open a YAML file
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: claude_code_version
    attributes:
      label: Claude Code Version
      placeholder: "e.g. 2.1.205"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14"
    validations:
      required: false

  - type: textarea
    id: yaml_sample
    attributes:
      label: YAML Sample
      description: A minimal YAML snippet that reproduces the issue (if applicable).
      render: yaml
    validations:
      required: false

  - type: textarea
    id: plugin_errors
    attributes:
      label: /plugin Errors Tab Output
      description: Paste any relevant entries from the `/plugin` Errors tab (if applicable).
    validations:
      required: false
