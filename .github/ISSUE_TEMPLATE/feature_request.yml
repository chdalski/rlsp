name: Feature Request
description: Suggest a feature for rlsp-yaml
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What are you trying to accomplish?
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed Behavior
      description: Describe the feature and how it should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you have considered.
    validations:
      required: false

  - type: textarea
    id: yaml_sample
    attributes:
      label: YAML Sample
      description: A YAML snippet illustrating the use case (if applicable).
      render: yaml
    validations:
      required: false
