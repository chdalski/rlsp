name: "Feature Request"
description: "Suggest a feature for one of the RLSP crates or editor extensions"
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "rlsp-yaml (YAML language server)"
        - "rlsp-yaml-parser (parser library)"
        - "rlsp-fmt (pretty-printer engine)"
        - "VS Code extension"
        - "Zed extension"
        - "Unsure / multiple"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What are you trying to accomplish?
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed Behavior
      description: Describe the feature and how it should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you have considered.
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example
      description: An example illustrating the use case (if applicable).
    validations:
      required: false
