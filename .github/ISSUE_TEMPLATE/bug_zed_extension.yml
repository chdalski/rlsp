name: "Bug Report: Zed Extension"
description: "Report a bug in the rlsp-yaml Zed extension"
labels: ["bug", "zed-extension"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open a YAML file
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: "e.g. 0.1.1"
    validations:
      required: true

  - type: input
    id: zed_version
    attributes:
      label: Zed Version
      placeholder: "e.g. 0.150.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: false

  - type: textarea
    id: yaml_sample
    attributes:
      label: YAML Sample
      description: A minimal YAML snippet that reproduces the issue (if applicable).
      render: yaml
    validations:
      required: false

  - type: textarea
    id: zed_log
    attributes:
      label: Zed Log Excerpt
      description: Paste any relevant log excerpt from Zed (if applicable).
    validations:
      required: false
