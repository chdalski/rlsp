name: "Bug Report: VS Code Extension"
description: "Report a bug in the rlsp-yaml VS Code extension"
labels: ["bug", "vscode-extension"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open a YAML file
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      description: The extension uses CalVer versioning (YYYY.MM.NN).
      placeholder: "e.g. 2026.05.01"
    validations:
      required: true

  - type: input
    id: vscode_version
    attributes:
      label: VS Code Version
      placeholder: "e.g. 1.88.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: false

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - x64
        - arm64
        - Unsure
    validations:
      required: false

  - type: textarea
    id: yaml_sample
    attributes:
      label: YAML Sample
      description: A minimal YAML snippet that reproduces the issue (if applicable).
      render: yaml
    validations:
      required: false

  - type: textarea
    id: output_log
    attributes:
      label: OUTPUT Panel Log
      description: Paste any relevant output from the VS Code OUTPUT panel (if applicable).
    validations:
      required: false
