name: "Bug Report: rlsp-fmt"
description: "Report a bug in the pretty-printing engine"
labels: ["bug", "rlsp-fmt"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A Doc IR snippet or short caller that reproduces the issue.
      render: rust
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Output
      description: The output you expected.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Output
      description: The output you actually received.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: rlsp-fmt Version
      placeholder: "e.g. 0.3.1"
    validations:
      required: true
