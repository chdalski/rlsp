name: Zed Release

on:
  push:
    branches: [main]
    paths:
      - 'rlsp-yaml/integrations/zed/**'
  pull_request:
    branches: [main]
    paths:
      - 'rlsp-yaml/integrations/zed/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          targets: wasm32-wasip2
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rlsp-yaml/integrations/zed
      - name: cargo check
        run: cargo check --manifest-path rlsp-yaml/integrations/zed/Cargo.toml --target wasm32-wasip2
      - name: cargo clippy
        run: cargo clippy --manifest-path rlsp-yaml/integrations/zed/Cargo.toml --all-targets --target wasm32-wasip2 -- -D warnings

  # Preflight: verify rlsp-yaml is registered in the upstream Zed registry
  # before doing any release work. The version bump and registry PR steps both
  # assume the [rlsp-yaml] entry already exists in extensions.toml — that's the
  # one-time manual registration. Failing here keeps main clean of dangling tags
  # when the workflow is triggered before registration is merged.
  preflight:
    name: Verify upstream registration
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check rlsp-yaml entry exists in upstream extensions.toml
        run: |
          TOML=$(curl --retry 3 --retry-delay 2 -fsSL \
            "https://raw.githubusercontent.com/zed-industries/extensions/main/extensions.toml")
          if ! printf '%s\n' "$TOML" | grep -qFx '[rlsp-yaml]'; then
            echo "::error::rlsp-yaml is not registered in zed-industries/extensions yet."
            echo "::error::The initial registration PR must be merged before automated releases can run."
            exit 1
          fi
          echo "Found [rlsp-yaml] entry in upstream extensions.toml"

  # Runs only on workflow_dispatch (triggered by trigger-zed in release-plz.yml).
  # Reads current version from extension.toml, increments the patch component,
  # commits and tags in this repo, then trigger-registry-pr dispatches the
  # registry PR workflow.
  commit-and-tag:
    name: Bump version and tag
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: zed-release
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: bump
        run: |
          CURRENT=$(grep '^version' rlsp-yaml/integrations/zed/extension.toml \
            | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Unexpected version format in extension.toml: '$CURRENT'"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT"

      - name: Update extension.toml
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" \
            rlsp-yaml/integrations/zed/extension.toml

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          TAG="zed-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rlsp-yaml/integrations/zed/extension.toml
          git commit -m "chore(zed): bump extension to v${VERSION}"
          git tag -a "$TAG" -m "Zed extension v${VERSION}"
          git push origin HEAD "$TAG"

  trigger-registry-pr:
    name: Trigger registry PR
    needs: commit-and-tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch registry PR workflow
        env:
          VERSION: ${{ needs.commit-and-tag.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run zed-registry-pr.yml --repo "${GITHUB_REPOSITORY}" --field "tag=zed-v${VERSION}"
