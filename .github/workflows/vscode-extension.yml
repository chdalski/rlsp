name: VS Code Extension

on:
  push:
    branches:
      - main
    paths:
      - 'rlsp-yaml/integrations/vscode/**'
    tags:
      - 'rlsp-yaml-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version in CalVer format (e.g., 2026.4.0). Auto-generated if omitted.'
        required: false

jobs:
  resolve-version:
    name: Resolve extension version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rlsp-yaml-v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need all tags

      - name: Resolve CalVer version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            PREFIX="$(date -u +%Y.%-m)"  # %-m is GNU-specific; job is pinned to ubuntu-latest
            LATEST=$(git tag -l "vscode-v${PREFIX}.*" --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              NN=0
            else
              LAST_NN="${LATEST##*.}"
              NN=$((LAST_NN + 1))
            fi
            VERSION="${PREFIX}.${NN}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved extension version: $VERSION"

      - name: Create version tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="vscode-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  build-extension:
    name: Build VSIX (${{ matrix.target }})
    needs: resolve-version
    if: ${{ !failure() && !cancelled() }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            vsce-target: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            vsce-target: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            vsce-target: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            vsce-target: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            vsce-target: win32-x64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build binary (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to extension server directory (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p rlsp-yaml/integrations/vscode/server/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rlsp-yaml rlsp-yaml/integrations/vscode/server/${{ matrix.target }}/rlsp-yaml

      - name: Copy binary to extension server directory (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path rlsp-yaml/integrations/vscode/server/${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/rlsp-yaml.exe rlsp-yaml/integrations/vscode/server/${{ matrix.target }}/rlsp-yaml.exe
        shell: pwsh

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        working-directory: rlsp-yaml/integrations/vscode
        run: pnpm install

      - name: Build extension
        working-directory: rlsp-yaml/integrations/vscode
        run: pnpm run build

      - name: Run tests
        working-directory: rlsp-yaml/integrations/vscode
        run: pnpm run test

      - name: Run integration tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: rlsp-yaml/integrations/vscode
        run: xvfb-run -a pnpm run test:integration

      - name: Set extension version
        if: needs.resolve-version.outputs.version != ''
        working-directory: rlsp-yaml/integrations/vscode
        run: pnpm pkg set "version=${{ needs.resolve-version.outputs.version }}"

      - name: Package VSIX
        working-directory: rlsp-yaml/integrations/vscode
        run: pnpx @vscode/vsce package --target ${{ matrix.vsce-target }} --no-dependencies

      - uses: actions/upload-artifact@v7
        with:
          name: rlsp-yaml-${{ matrix.vsce-target }}
          path: rlsp-yaml/integrations/vscode/*.vsix

  publish-extension:
    name: Publish to VS Code Marketplace
    needs: [resolve-version, build-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rlsp-yaml-v') || github.event_name == 'workflow_dispatch'
    permissions: {}

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: rlsp-yaml-*
          merge-multiple: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Publish to Marketplace
        run: |
          for vsix in */rlsp-yaml-*.vsix; do
            pnpx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
