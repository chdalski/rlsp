[package]
name = "rlsp-yaml"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
tower-lsp = { version = "0.20", features = ["proposed"] }
tokio = { version = "1", features = ["full"] }
serde_json = "1"
serde = { version = "1", features = ["derive"] }
saphyr = "0.0.6"
regex = "1"
once_cell = "1"
ureq = { version = "3", features = ["rustls"] }

[dev-dependencies]
futures = "0.3"
tower = "0.4"
