# Allowed outbound domains for the devcontainer firewall.
# The firewall blocks all outbound traffic except to these
# destinations. One entry per line.
#
# Supported entry types:
#   domain.com          — resolved via DNS at container start
#   192.168.1.0/24      — CIDR range added directly
#
# Lines starting with # are comments. Blank lines are ignored.
#
# Note: GitHub IP ranges are always allowed. The firewall
# script fetches them dynamically via api.github.com/meta
# (web, api, git endpoints). To disable GitHub access,
# edit init-firewall.sh directly.

# --- Claude Code / Anthropic ---
api.anthropic.com
statsig.anthropic.com
statsig.com
sentry.io

# --- Portkey ---
api.portkey.ai

# --- Package registries ---
# Uncomment the registries your project needs:
registry.npmjs.org
pypi.org
files.pythonhosted.org
crates.io
static.crates.io
index.crates.io
proxy.golang.org
sum.golang.org
storage.googleapis.com

# --- Language documentation ---
# Agents consult these when researching libraries and APIs
# ("research before implementing" rule). Uncomment the
# languages your project uses:
docs.rs                    # Rust crate documentation
docs.python.org            # Python standard library docs
pkg.go.dev                 # Go package documentation
developer.mozilla.org      # MDN — JavaScript/Web reference
nodejs.org                 # Node.js documentation

# --- VS Code (needed when using devcontainers with VS Code) ---
marketplace.visualstudio.com
vscode.blob.core.windows.net
update.code.visualstudio.com
