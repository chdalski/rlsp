coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
comment:
  layout: "diff, flags, files"
  require_changes: true
component_management:
  individual_components:
    - component_id: rlsp-yaml
      paths:
        - rlsp-yaml/**
